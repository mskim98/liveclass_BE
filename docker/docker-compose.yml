services:
  postgres:
    image: postgres:16-alpine
    container_name: alert_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-alert}
      POSTGRES_USER: ${DB_USERNAME:-alert}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alert}
      TZ: UTC
    volumes:
      - alert_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-alert} -d ${DB_NAME:-alert}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - alert_net

  app:
    build:
      context: ../alert_system
      dockerfile: Dockerfile
    image: alert-system:local
    container_name: alert_app
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-alert}
      DB_USERNAME: ${DB_USERNAME:-alert}
      DB_PASSWORD: ${DB_PASSWORD:-alert}
      DB_POOL_MAX: ${DB_POOL_MAX:-30}
      DB_POOL_MIN: ${DB_POOL_MIN:-10}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-none}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_SQL: ${LOG_SQL:-INFO}
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alert_net

networks:
  alert_net:
    name: alert_net

volumes:
  alert_pg_data:
    name: alert_pg_data
