spring:
  application:
    name: alert-system

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:alert}
    username: ${DB_USERNAME:alert}
    password: ${DB_PASSWORD:alert}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: alert-pool
      maximum-pool-size: ${DB_POOL_MAX:80}
      minimum-idle: ${DB_POOL_MIN:20}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:3000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

notification:
  worker:
    polling-interval-ms: ${WORKER_POLLING_INTERVAL_MS:1000}
    batch-size: ${WORKER_BATCH_SIZE:50}
    thread-pool:
      core-size: ${WORKER_THREADS_CORE:60}
      max-size: ${WORKER_THREADS_MAX:60}
      queue-capacity: ${WORKER_QUEUE_CAPACITY:200}
      thread-name-prefix: "notif-dispatch-"

  retry:
    base-delay-seconds: ${RETRY_BASE_DELAY_SEC:1}
    multiplier: ${RETRY_MULTIPLIER:2.0}
    max-delay-seconds: ${RETRY_MAX_DELAY_SEC:60}
    jitter-ratio: ${RETRY_JITTER_RATIO:0.2}

  sender:
    email:
      failure-rate: ${SENDER_EMAIL_FAILURE_RATE:0.0}
      non-retryable-rate: ${SENDER_EMAIL_NON_RETRYABLE_RATE:0.0}
    in-app:
      failure-rate: ${SENDER_INAPP_FAILURE_RATE:0.0}

logging:
  level:
    src.alert_system: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${LOG_SQL:INFO}
