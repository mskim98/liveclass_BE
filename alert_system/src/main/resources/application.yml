spring:
  application:
    name: alert-system

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:alert}
    username: ${DB_USERNAME:alert}
    password: ${DB_PASSWORD:alert}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: alert-pool
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:3000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    src.alert_system: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${LOG_SQL:INFO}
